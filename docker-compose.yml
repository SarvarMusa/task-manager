version: '3.8'

services:
  # PostgreSQL Database
  postgres_db:
    image: postgres:16-alpine
    container_name: task_manager_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: task_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d task_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - task_manager_network

  # Task Manager Application
  task_manager_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_manager_app
    restart: always
    environment:
      # ==========================================
      # SPRING CORE CONFIGURATION
      # ==========================================
      SPRING_PROFILES_ACTIVE: prod
      SPRING_APPLICATION_NAME: task-manager
      
      # ==========================================
      # DATABASE CONFIGURATION
      # ==========================================
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_db:5432/task_manager
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      
      # ==========================================
      # JPA / HIBERNATE CONFIGURATION
      # ==========================================
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      
      # ==========================================
      # FLYWAY MIGRATION CONFIGURATION
      # ==========================================
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "true"
      
      # ==========================================
      # AOP CONFIGURATION
      # ==========================================
      SPRING_AOP_AUTO: "true"
      SPRING_AOP_PROXY_TARGET_CLASS: "true"
      
      # ==========================================
      # JWT AUTHENTICATION CONFIGURATION
      # ==========================================
      JWT_SECRET: dGFzay1tYW5hZ2VyLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLTIwMjY=
      JWT_EXPIRATION: "86400000"
      
      # ==========================================
      # LOGGING CONFIGURATION
      # ==========================================
      LOGGING_LEVEL_ROOT: WARN
      LOGGING_LEVEL_APP: INFO
      LOGGING_LEVEL_SECURITY: WARN
      LOGGING_LEVEL_HIBERNATE: ERROR
      LOGGING_FILE_NAME: logs/task-manager.log
      LOGGING_LOGBACK_ROLLINGPOLICY_MAX_FILE_SIZE: 100MB
      LOGGING_LOGBACK_ROLLINGPOLICY_MAX_HISTORY: "90"
      LOGGING_LOGBACK_ROLLINGPOLICY_TOTAL_SIZE_CAP: 50GB
      
      # ==========================================
      # JVM OPTIONS
      # ==========================================
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC"
    ports:
      - "8080:8080"
    depends_on:
      postgres_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - task_manager_network

volumes:
  postgres_data:
    driver: local

networks:
  task_manager_network:
    driver: bridge
